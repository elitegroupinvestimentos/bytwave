# Bytwave backend — sobrescreve as fases do nixpacks pra evitar `npm ci`.
# --include=dev força instalar typescript (devDep) mesmo com NODE_ENV=production.

[phases.install]
cmds = ["npm install --include=dev --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
